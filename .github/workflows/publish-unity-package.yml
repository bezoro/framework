name: Publish Unity Package

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203

      - name: Resolve package version
        id: package-version
        shell: pwsh
        run: |
          $version = ./scripts/Get-PackageVersion.ps1
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved package version $version"

      - name: Restore
        run: dotnet restore bezoro.framework.sln

      - name: Build release binaries
        run: dotnet build bezoro.framework.sln -c Release --no-restore /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.package-version.outputs.version }} /p:PackageVersion=${{ steps.package-version.outputs.version }} /p:InformationalVersion=${{ steps.package-version.outputs.version }}

      - name: Check public API baseline
        shell: pwsh
        run: ./scripts/Export-PublicApi.ps1 -Check

      - name: Run release tests
        run: dotnet test bezoro.framework.sln -c Release --no-build --verbosity minimal

  publish-unity-package:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.203

      - name: Resolve package version
        id: package-version
        shell: pwsh
        run: |
          $version = ./scripts/Get-PackageVersion.ps1
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved package version $version"

      - name: Build release binaries
        run: dotnet build bezoro.framework.sln -c Release /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.package-version.outputs.version }} /p:PackageVersion=${{ steps.package-version.outputs.version }} /p:InformationalVersion=${{ steps.package-version.outputs.version }}

      - name: Build Unity package
        shell: pwsh
        run: ./scripts/Build-UnityPackage.ps1 -Configuration Release -OutputPath ./artifacts/unity-package -PackageVersion "${{ steps.package-version.outputs.version }}"

      - name: Publish upm branch
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: ./scripts/Publish-UnityPackageBranch.ps1 -PackagePath ./artifacts/unity-package -Branch upm
